# Dev environment overrides for charts/frontend (in the expense-tracker app repo).
# image.tag is updated automatically by the deploy-staging GitHub Actions workflow.
image:
  repository: 857812839927.dkr.ecr.eu-central-1.amazonaws.com/expense-tracker-frontend
  tag: f5b40f3b76fd973cfda58fee36ca0098534d02aa

env:
  BACKEND_URL: http://expense-tracker-backend.expense-tracker.svc.cluster.local:8000

ingress:
  enabled: true
  className: nginx
  host: expensetracker.skin
  path: /
  annotations:
    cert-manager.io/cluster-issuer: letsencrypt-prod
    nginx.ingress.kubernetes.io/force-ssl-redirect: "true"
  tls:
    enabled: true
    secretName: frontend-tls

resources:
  requests:
    cpu: 100m
    memory: 128Mi
  limits:
    cpu: 250m
    memory: 256Mi
