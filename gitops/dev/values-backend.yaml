# Dev environment overrides for charts/backend (in the expense-tracker app repo).
# image.tag is updated automatically by the deploy-staging GitHub Actions workflow.
image:
  repository: 024249678351.dkr.ecr.eu-central-1.amazonaws.com/expense-tracker-backend
  tag: 83c05486d9d97f3c61aacabbf2ae254c6bc9e4bc

env:
  DATABASE_URL: postgresql://expenses:expenses@expense-tracker-db-postgresql.expense-tracker.svc.cluster.local:5432/expenses

# Kubernetes Secret providing JWT_SECRET_KEY - create it once in the cluster
# before the first sync (see the chart's values.yaml for the exact command).
# Not committing the secret value itself here - only its name.
envSecretName: expense-tracker-backend-secret

ingress:
  enabled: true
  className: nginx
  host: api.expensetracker.skin
  path: /
  annotations:
    cert-manager.io/cluster-issuer: letsencrypt-prod
  tls:
    enabled: true
    secretName: backend-tls

resources:
  requests:
    cpu: 100m
    memory: 128Mi
  limits:
    cpu: 250m
    memory: 256Mi

metrics:
  enabled: true
